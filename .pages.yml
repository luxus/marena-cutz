media:
  input: public/images
  output: /images
  rename: safe
  categories: [image]

settings:
  content:
    merge: true

content:
  # ─── Globale Einstellungen ───────────────────────────────────────────────
  - name: settings
    label: Einstellungen
    type: file
    path: src/content/settings.md
    format: yaml-frontmatter
    fields:
      - name: name
        label: Seitenname
        type: string
      - name: tagline
        label: Tagline
        type: string
      - name: owner
        label: Inhaber
        type: string
      - name: address
        label: Strasse & Nr.
        type: string
      - name: zipCity
        label: PLZ / Ort
        type: string
      - name: phone
        label: Telefon
        type: string
      - name: email
        label: E-Mail
        type: string
      - name: bookingUrl
        label: Buchungslink
        type: string
      - name: instagramUrl
        label: Instagram URL
        type: string
      - name: tiktokUrl
        label: TikTok URL
        type: string
      - name: mapsUrl
        label: Google Maps Link
        type: string
      - name: metaDescription
        label: Meta Description
        type: text
      - name: ogDescription
        label: Open Graph Description
        type: text
      - name: ogImageAlt
        label: OG Bild Alt-Text
        type: string
      - name: twitterDescription
        label: Twitter/X Description
        type: text

  # ─── Hero / Startseite ──────────────────────────────────────────────────
  - name: homepage
    label: Startseite (Hero)
    type: file
    path: src/content/home.md
    format: yaml-frontmatter
    fields:
      - name: eyebrow
        label: Kleine Überschrift
        type: string
      - name: headline
        label: Hauptüberschrift
        type: string
      - name: text
        label: Intro Text
        type: text
      - name: socialItems
        label: Best-of Social Posts
        type: object
        list:
          collapsible:
            collapsed: true
            summary: '{platform}: {alt}'
        fields:
          - name: platform
            label: Plattform
            type: select
            options:
              values:
                - Instagram
                - TikTok
          - name: imageUrl
            label: Bild
            type: image
          - name: permalink
            label: Link zum Post
            type: string
          - name: alt
            label: Alt Text
            type: string
          - name: objectPosition
            label: Bildposition (z.B. center top)
            type: string
          - name: featured
            label: Hervorheben
            type: boolean

  # ─── Preise ─────────────────────────────────────────────────────────────
  - name: prices
    label: Preise
    type: group
    items:
      - name: prices-page
        label: Sektion Titel
        type: file
        path: src/content/prices.md
        format: yaml-frontmatter
        fields:
          - name: title
            label: Titel
            type: string

      - name: barber-angelo
        label: Barber Angelo
        type: file
        path: src/content/barbers/angelo.md
        format: yaml-frontmatter
        fields:
          - name: name
            label: Name
            type: string
          - name: position
            label: Rolle
            type: string
          - name: about
            label: Kurzbeschreibung
            type: text
          - name: order
            label: Reihenfolge
            type: number
          - name: image
            label: Bild
            type: image
          - name: services
            label: Leistungen
            type: object
            list:
              collapsible:
                collapsed: true
                summary: '{name} — {price}'
            fields:
              - name: name
                label: Leistung
                type: string
              - name: duration
                label: Dauer
                type: string
              - name: price
                label: Preis
                type: string
              - name: featured
                label: Hervorheben
                type: boolean

      - name: barber-sean
        label: Barber Sean
        type: file
        path: src/content/barbers/sean.md
        format: yaml-frontmatter
        fields:
          - name: name
            label: Name
            type: string
          - name: position
            label: Rolle
            type: string
          - name: about
            label: Kurzbeschreibung
            type: text
          - name: order
            label: Reihenfolge
            type: number
          - name: image
            label: Bild
            type: image
          - name: services
            label: Leistungen
            type: object
            list:
              collapsible:
                collapsed: true
                summary: '{name} — {price}'
            fields:
              - name: name
                label: Leistung
                type: string
              - name: duration
                label: Dauer
                type: string
              - name: price
                label: Preis
                type: string
              - name: featured
                label: Hervorheben
                type: boolean

      - name: booking-drawer
        label: Termin Drawer Texte
        type: file
        path: src/content/booking.md
        format: yaml-frontmatter
        fields:
          - name: title
            label: Drawer Titel
            type: string
          - name: walkInsTitle
            label: Walk-ins Überschrift
            type: string
          - name: walkInsText
            label: Walk-ins Text
            type: text
          - name: cancellationTitle
            label: Absagen Überschrift
            type: string
          - name: cancellationText
            label: Absagen Text
            type: text
          - name: latenessTitle
            label: Verspätung Überschrift
            type: string
          - name: latenessText
            label: Verspätung Text
            type: text
          - name: ctaLabel
            label: Bestätigungs-Button Text
            type: string
          - name: cancelLabel
            label: Abbrechen-Button Text
            type: string

      - name: parking-drawer
        label: Parken Drawer Texte
        type: file
        path: src/content/parking.md
        format: yaml-frontmatter
        fields:
          - name: title
            label: Drawer Titel
            type: string
          - name: image
            label: Bild
            type: image
          - name: entrance
            label: Eingang
            type: text
          - name: parking
            label: Parkplätze
            type: text
          - name: transit
            label: ÖV
            type: text

  # ─── Über uns ────────────────────────────────────────────────────────────
  - name: about
    label: Über uns
    type: file
    path: src/content/about.md
    format: yaml-frontmatter
    fields:
      - name: title
        label: Titel
        type: string
      - name: text
        label: Text
        type: text
      - name: openingHours
        label: Öffnungszeiten
        type: object
        list:
          collapsible:
            collapsed: true
            summary: '{day}: {hours}'
        fields:
          - name: day
            label: Tag
            type: string
          - name: hours
            label: Zeiten
            type: string
      - name: paymentMethods
        label: Zahlungsarten
        type: string
        list: true

  # ─── Rechtliches ─────────────────────────────────────────────────────────
  - name: legal
    label: Rechtliches
    type: group
    items:
      - name: impressum
        label: Impressum
        type: file
        path: src/content/impressum.md
        format: yaml-frontmatter
        fields:
          - name: title
            label: Titel
            type: string
          - name: body
            label: Inhalt (Markdown)
            type: rich-text
            options:
              format: markdown
      - name: datenschutz
        label: Datenschutz
        type: file
        path: src/content/datenschutz.md
        format: yaml-frontmatter
        fields:
          - name: title
            label: Titel
            type: string
          - name: body
            label: Inhalt (Markdown)
            type: rich-text
            options:
              format: markdown
